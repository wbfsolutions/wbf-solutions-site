<!-- PAGE -->
 <br><br><br><br><br>
<h1>Create Account</h1>

<div class="auth-card">

  <!-- BASIC INFO -->
  <input id="name" type="text" placeholder="Your Name">
  <input id="email" type="email" placeholder="Email">

  <!-- COUNTRY -->
  <input id="country" list="countryList" placeholder="Select Country">
  <datalist id="countryList"></datalist>

  <!-- ACCOUNT TYPE -->
  <select id="accountType">
    <option value="private">Private</option>
    <option value="company">Company / Organization</option>
  </select>

  <!-- COMPANY NAME -->
  <input id="companyName" type="text" placeholder="Company Name" style="display:none;">

  <!-- PASSWORDS -->
  <input id="password" type="password" placeholder="Password">
  <input id="confirmPassword" type="password" placeholder="Confirm Password">

  <!-- CHECKBOXES -->
  <label class="check-row">
    <input type="checkbox" id="newsletterOptIn">
    <span>Receive occasional updates and product emails</span>
  </label>

  <label class="check-row">
    <input type="checkbox" id="acceptLegal">
    <span>
      I agree to the <a href="terms.html" target="_blank">Terms</a> and
      <a href="privacy.html" target="_blank">Privacy Policy</a>
    </span>
  </label>

  <button onclick="signInWithGoogle()" class="btn primary">
  Continue with Google
</button>

  <button onclick="signUp()" class="btn primary">Sign Up</button>

  <p id="error" style="color:#ff6b6b; margin-top:10px;"></p>

</div>

<!-- =========================
     FIREBASE + SUPABASE SCRIPT
========================= -->
<script type="module">
import { auth } from "./firebase.js";
import {
  onAuthStateChanged,
  signOut,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.addEventListener("DOMContentLoaded", () => {

  const loginLink = document.getElementById("loginLink");
  const signupLink = document.getElementById("signupLink");
  const logoutLink = document.getElementById("logoutLink");
  const userName = document.getElementById("userName");

  /* =========================
     AUTH STATE
  ========================= */
  onAuthStateChanged(auth, (user) => {

    const loggedIn = !!user;

    if (loginLink) loginLink.style.display = loggedIn ? "none" : "inline-block";
    if (signupLink) signupLink.style.display = loggedIn ? "none" : "inline-block";
    if (logoutLink) logoutLink.style.display = loggedIn ? "inline-block" : "none";

    if (userName) {
      userName.style.display = loggedIn ? "inline-block" : "none";
      userName.textContent = user?.displayName || "User";
    }
  });

  /* =========================
     LOGOUT
  ========================= */
  if (logoutLink) {
    logoutLink.addEventListener("click", async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = "index.html";
    });
  }

  /* =========================
     SIDE MENU (FIXED)
  ========================= */
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");

  window.toggleMenu = function () {
    if (!menu || !overlay) return;

    menu.classList.toggle("open");
    overlay.classList.toggle("show");
  };

  if (overlay) {
    overlay.addEventListener("click", () => {
      menu.classList.remove("open");
      overlay.classList.remove("show");
    });
  }

  const sideLogout = document.getElementById("sideLogout");

  if (sideLogout) {
    sideLogout.addEventListener("click", async (e) => {
      e.preventDefault();
      await signOut(auth);
      window.location.href = "index.html";
    });
  }

  /* =========================
     FORGOT PASSWORD
  ========================= */
  const forgotPassword = document.getElementById("forgotPassword");

  if (forgotPassword) {
    forgotPassword.addEventListener("click", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email")?.value?.trim();
      const errorBox = document.getElementById("error");
      const successBox = document.getElementById("success");

      if (!email) {
        if (errorBox) errorBox.textContent = "Enter email first.";
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        if (successBox) successBox.textContent = "Reset email sent.";
      } catch (err) {
        if (errorBox) errorBox.textContent = err.message;
      }
    });
  }

});
</script>

<script type="module" src="script.js"></script>
