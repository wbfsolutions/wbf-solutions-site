<!-- AUTH CONTENT -->
<h1>Login</h1>

<div class="auth-card">

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()" class="btn primary">Login</button>

  <p id="error" style="color:#ff6b6b; margin-top:10px;"></p>

  <p style="margin-top:10px;">
  <a href="#" id="forgotPassword" style="color:#6AA6FF; font-size:14px;">
    Forgot password?
  </a>
</p>

<p id="error" style="color:#ff6b6b; margin-top:10px;"></p>
<p id="success" style="color:#4ade80; margin-top:10px;"></p>

</div>

<!-- FIREBASE LOGIN LOGIC -->
<script type="module">
import { auth } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.login = async function () {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");

  errorBox.textContent = "";

  if (!email || !password) {
    errorBox.textContent = "Please enter email and password.";
    return;
  }

  try {

    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // 🚫 BLOCK IF NOT VERIFIED
    if (!user.emailVerified) {

      await sendEmailVerification(user);

      errorBox.textContent =
        "Email not verified. A new verification email has been sent.";

      // optional: sign them out immediately
      await auth.signOut();

      return;
    }

    // ✅ ALLOW LOGIN
    window.location.href = "index.html";

  } catch (err) {
    errorBox.textContent = err.message;
  }
};
</script>
